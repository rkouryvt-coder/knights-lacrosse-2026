name: Weekly Stats Update

on:
  schedule:
    - cron: '0 14 * * 1'  # Every Monday at 9am CT (14:00 UTC)
  workflow_dispatch:       # Allow manual trigger

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright + Chromium
        run: npx playwright install chromium --with-deps

      - name: Scrape opponent records
        run: node scripts/scrape-records.mjs

      - name: Scrape player stats
        run: node scripts/scrape-stats.mjs

      - name: Commit if anything changed
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add src/data/games.ts src/data/stats.ts
          git diff --staged --quiet && echo "No changes." || (git commit -m "chore: weekly update — opponent records and player stats" && git push)
